<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self'"
        />
        <meta
            http-equiv="X-Content-Security-Policy"
            content="default-src 'self'; script-src 'self'"
        />

        <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' https: 'unsafe-inline'">
        <link rel="stylesheet" href="dashboard.css">
        <title>System App</title>
    </head>
    <body>
        <div class="dashboard">
            <p id="message"></p>

            <!-- display charts -->
            <div class="charts-grid">
                <h2>Overview</h2>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header">
                            <h3>Donut Chart</h3>
                        </div>
                        <div class="card-body">
                            <canvas id="donutChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header">
                            <h3>Bar Chart</h3>
                        </div>
                        <div class="card-body">
                            <canvas id="barChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- display table -->
            <div class="row">
                <div class="table-grid">
                    <h2>User List</h2>
                    <div class="table-responsive">
                        <table id="userTable" class="table">
                            <thead>
                                <tr>
                                    <th scope="col" class="col-index">#</th>
                                    <th scope="col" class="col-name">First Name</th>
                                    <th scope="col" class="col-name">Last Name</th>
                                    <th scope="col" class="col-username">Username</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </body>

    <script src="chart.umd.js"></script>
    <script src="dashboard.js"></script>
</html>
